<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lottery Results Board</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  /* ══ DESIGN TOKENS ══ */
  :root {
    --bg-deep:     #e8edf5;
    --bg-panel:    #ffffff;
    --border:      #c8d4e8;
    --mid:         #4a5f7a;
    --dark:        #1a2a40;

    --header-h:    62px;
    --ticker-h:    40px;
    --main-pad:    10px;
    --card-head-h: 46px;
    --card-gap:    10px;

    --row-h: calc(
      (100vh - var(--header-h) - var(--ticker-h) - var(--main-pad) * 2 - var(--card-head-h))
      / 15
    );
  }

  /* ══ RESET ══ */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* ══ LAYOUT ROOT ══ */
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg-deep);
    color: var(--dark);
    font-family: 'Poppins', sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* ══ HEADER ══ */
  header {
    flex-shrink: 0;
    height: var(--header-h);
    background: linear-gradient(180deg, #1a3560, #1e3d6e);
    border-bottom: 2px solid #2c5090;
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 20px rgba(0,0,0,.2);
    z-index: 100;
  }

  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 40px; height: 40px; border-radius: 9px; flex-shrink: 0;
    background: linear-gradient(135deg, #1565c0, #5bc8ff);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; color: #fff;
  }
  .logo-text {
    font-size: 18px; font-weight: 900; letter-spacing: 1px;
    color: #fff; text-transform: uppercase; line-height: 1;
  }
  .logo-sub {
    font-size: 10px; letter-spacing: 3px;
    color: rgba(255,255,255,.45); text-transform: uppercase; margin-top: 2px;
  }

  .hdr-center { text-align: center; }
  .hdr-warn {
    font-size: 20px; font-weight: 700; letter-spacing: 1px;
    color: #ffcc80; text-transform: uppercase;
    animation: blink 2.2s step-end infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }

  .clock-wrap { text-align: right; }
  .hdr-date {
    font-size: 11px; letter-spacing: 2px;
    color: rgba(255,255,255,.55); text-transform: uppercase; margin-bottom: 2px;
  }
  .clock { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: 2px; line-height: 1; }

  /* ══ MAIN GRID ══ */
  main {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--card-gap);
    padding: var(--main-pad);
    overflow: hidden;
    align-items: start;
  }

  /* ══ COLUMN ══ */
  .col-wrap {
    display: flex;
    flex-direction: column;
    gap: var(--card-gap);
  }

  /* ══ CARD ══ */
  .card {
    display: flex;
    flex-direction: column;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    animation: rise .45s ease both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* ══ CARD HEADER ══ */
  .card-head {
    flex-shrink: 0;
    height: var(--card-head-h);
    padding: 0 14px;
    display: flex; align-items: center;
  }
  .card-title {
    font-size: 20px; font-weight: 700; letter-spacing: .5px;
    color: #fff; text-transform: uppercase;
  }

  /* ══ ROW ══ */
  .row {
    height: var(--row-h);
    flex-shrink: 0;
    display: flex; align-items: center;
    padding: 0 14px;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .row:last-child { border-bottom: none; }
  .row:hover      { background: #eef3fc; }

  /* ══ TIME LABEL ══ */
  .time {
    width: 90px; flex-shrink: 0;
    font-size: 18px; font-weight: 600;
    color: var(--mid); letter-spacing: .5px; line-height: 1;
  }

  /* ══ BALLS ══ */
  .balls {
    flex: 1;
    display: flex; align-items: center; justify-content: flex-end;
    gap: 3px;
  }

  .ball-group {
    display: flex; align-items: center;
    gap: 3px;
  }

  .ball-sep {
    font-size: 20px; font-weight: 900;
    color: var(--mid); line-height: 1;
    flex-shrink: 0; margin: 0 1px;
  }

  .ball, .ball-d {
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; color: #fff; flex-shrink: 0;
    font-variant-numeric: tabular-nums;
    box-shadow: 0 2px 5px rgba(0,0,0,.18);
  }

  .ball   { width: 38px; height: 38px; font-size: 17px; }
  .ball-d { width: 30px; height: 30px; font-size: 18px; }

  /* ══ STATUS BADGES (card header) ══ */
  .card-status {
    font-size: 9px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; padding: 3px 10px; border-radius: 12px;
    margin-left: auto; flex-shrink: 0;
  }
  .card-status-closed {
    background: rgba(255,255,255,.2); color: #fff;
  }
  .card-status-pending {
    background: #ff8f00; color: #fff;
    animation: pulse-pending 1.5s ease-in-out infinite;
  }
  .card-status-noresult {
    background: rgba(255,255,255,.2); color: rgba(255,255,255,.7);
  }
  @keyframes pulse-pending {
    0%, 100% { opacity: 1; }
    50% { opacity: .5; }
  }

  /* ══ ROW-LEVEL STATUS (inline, for pending rows without numbers) ══ */
  .status-pending {
    background: linear-gradient(90deg, #ff8f00, #ffa726);
    color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; padding: 4px 14px; border-radius: 20px;
    animation: pulse-pending 1.5s ease-in-out infinite;
  }
  .status-noresult {
    background: #bdbdbd; color: #fff; font-size: 12px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 4px 14px; border-radius: 20px;
  }
  .status-corrected {
    font-size: 10px; font-weight: 700; color: #e65100;
    margin-left: 6px; letter-spacing: .5px;
  }
  .row-status {
    font-size: 9px; font-weight: 700; letter-spacing: .5px;
    text-transform: uppercase; padding: 2px 8px; border-radius: 10px; flex-shrink: 0;
  }
  .row-status-pending {
    background: #fff3e0; color: #e65100;
    animation: pulse-pending 1.5s ease-in-out infinite;
  }
  .row-status-noresult { background: #f5f5f5; color: #9e9e9e; }

  /* ══ STALE (not today's results) ══ */
  .row.stale .balls { opacity: 0.5; filter: saturate(0.4); }
  .row.stale .time  { color: #a0aab4; }
  .stale-tag {
    font-size: 9px; font-weight: 700; letter-spacing: .5px;
    text-transform: uppercase; color: #8e99a4;
    background: #e8ecf1; padding: 2px 7px; border-radius: 8px;
    flex-shrink: 0; line-height: 1;
  }

  /* ══ TICKER ══ */
  .ticker {
    flex-shrink: 0;
    height: var(--ticker-h);
    background: #1a3560;
    border-top: 2px solid #2c5090;
    display: flex; align-items: center; overflow: hidden;
    z-index: 100;
  }
  .ticker-tag {
    flex-shrink: 0;
    height: 100%; padding: 0 16px;
    background: #fff; color: #1a3560;
    font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    display: flex; align-items: center;
  }
  .ticker-track { display: flex; animation: scroll 55s linear infinite; white-space: nowrap; }
  .ticker-item  { font-size: 14px; letter-spacing: 1.5px; color: rgba(255,255,255,.65); padding: 0 32px; }
  .ticker-item b { font-size: 14px; color: #fff; font-weight: 700; }
  @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ══ MOBILE FALLBACK ══ */
  @media (max-width: 900px) {
    html, body { overflow: auto; height: auto; }
    main { grid-template-columns: repeat(2, 1fr); height: auto; overflow: visible; }
    .row { height: 52px; }
  }
  @media (max-width: 540px) {
    main      { grid-template-columns: 1fr; }
    header    { height: auto; padding: 12px 14px; flex-wrap: wrap; gap: 6px; }
    .hdr-warn { font-size: 15px; }
    .clock    { font-size: 20px; }
    .row      { height: 48px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">L</div>
    <div>
      <div class="logo-text">Lucky Draw</div>
      <div class="logo-sub">Results Board</div>
    </div>
  </div>
  <div class="hdr-center">
    <div class="hdr-warn">&#9888; &nbsp; Check your ticket before you leave &nbsp; &#9888;</div>
  </div>
  <div class="clock-wrap">
    <div class="hdr-date" id="dateStr"></div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<main id="board"></main>

<div class="ticker">
  <div class="ticker-tag">RESULTS</div>
  <div class="ticker-track" id="ticker"></div>
</div>

<script>
  // ── Clock ──
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function tick() {
    const n = new Date();
    document.getElementById('clock').textContent =
      `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
    document.getElementById('dateStr').textContent =
      `${DAYS[n.getDay()]}, ${MONTHS[n.getMonth()]} ${n.getDate()}, ${n.getFullYear()}`;
  }
  tick(); setInterval(tick, 1000);

  // ── Day-of-week ball colors ──
  // Index 0 = Sunday, 1 = Monday, ... 6 = Saturday
  const DAY_COLORS = [
    '#c62828', // Sunday - Red
    '#1565c0', // Monday - Blue
    '#2e7d32', // Tuesday - Green
    '#7b1fa2', // Wednesday - Purple
    '#e65100', // Thursday - Orange
    '#00695c', // Friday - Dark Teal
    '#0d47a1'  // Saturday - Bold Blue
  ];

  const DAY_ABBR = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

  function getLocalToday() {
    return new Date().toLocaleDateString('en-CA');
  }

  function isStale(draw) {
    return draw.date && draw.date !== getLocalToday();
  }

  function getDayAbbr(draw) {
    if (!draw.date) return '';
    const [y, m, d] = draw.date.split('-').map(Number);
    return DAY_ABBR[new Date(y, m - 1, d).getDay()];
  }

  function getBallColor(draw) {
    if (draw.date) {
      const [y, m, d] = draw.date.split('-').map(Number);
      const dayOfWeek = new Date(y, m - 1, d).getDay();
      return DAY_COLORS[dayOfWeek];
    }
    // No date stored — use today's color so results always look active
    return DAY_COLORS[new Date().getDay()];
  }

  // ── Render helpers ──

  function renderBallsPick3(numbers, color) {
    return numbers.map((n, i) => {
      const ball = `<span class="ball" style="background:${color}">${n}</span>`;
      const group = `<span class="ball-group">${ball}</span>`;
      return (i < numbers.length - 1) ? group + '<span class="ball-sep">-</span>' : group;
    }).join('');
  }

  function renderBallsDigit(numbers, color) {
    let html = '';
    html += '<span class="ball-group">';
    for (let i = 0; i < numbers.length; i++) {
      if (numbers[i] === '-') {
        html += '</span><span class="ball-sep">-</span><span class="ball-group">';
      } else {
        html += `<span class="ball-d" style="background:${color}">${numbers[i]}</span>`;
      }
    }
    html += '</span>';
    return html;
  }

  function renderBalls(lottery, draw) {
    const c = getBallColor(draw);
    if (lottery.format === 'pick3') {
      return renderBallsPick3(draw.numbers, c);
    } else {
      return renderBallsDigit(draw.numbers, c);
    }
  }

  function getCardStatus(lottery) {
    const hasNumbers = lottery.draws.some(d => d.numbers && d.numbers.length > 0);
    const allClosed = lottery.draws.length > 0 && lottery.draws.every(d => d.status === 'closed');
    const hasPending = lottery.draws.some(d => d.status === 'pending');
    const allNoResult = lottery.draws.every(d => d.status === 'no_result');

    // Only show "no draw" if ALL draws are closed AND none have numbers
    if (allClosed && !hasNumbers) return 'closed';
    if (hasPending) return 'pending';
    if (allNoResult && !hasNumbers) return 'no_result';
    return null;
  }

  function renderCardStatusBadge(status) {
    if (status === 'closed') return '<span class="card-status card-status-closed">No Draw Today</span>';
    if (status === 'pending') return '<span class="card-status card-status-pending">Pending</span>';
    if (status === 'no_result') return '<span class="card-status card-status-noresult">No Result</span>';
    return '';
  }

  /** Pending state is managed by the backend scraper — trust it. */
  function isDrawPastDue(draw) {
    return draw.status === 'pending';
  }

  function renderRowBalls(lottery, draw) {
    const hasNumbers = draw.numbers && draw.numbers.length > 0;

    if (draw.status === 'closed') {
      return hasNumbers ? renderBalls(lottery, draw) : '';
    }

    if (draw.status === 'pending') {
      const badge = '<span class="row-status row-status-pending">Pending</span>';
      return hasNumbers ? badge + renderBalls(lottery, draw) : '<span class="status-pending">Pending</span>';
    }

    // No result: show indicator + old numbers if available
    if (draw.status === 'no_result') {
      const badge = '<span class="row-status row-status-noresult">No Result</span>';
      return hasNumbers ? badge + renderBalls(lottery, draw) : '<span class="status-noresult">No Result</span>';
    }

    // Normal: just numbers
    return hasNumbers ? renderBalls(lottery, draw) : '';
  }

  function renderCard(lottery) {
    const cardStatus = getCardStatus(lottery);

    const rows = lottery.draws.map(draw => {
      const ballsHtml = renderRowBalls(lottery, draw);
      const correctedTag = draw.corrected ? '<span class="status-corrected">CORRECTED</span>' : '';
      const stale = isStale(draw);
      const staleClass = stale ? ' stale' : '';
      const staleTag = stale ? `<span class="stale-tag">${getDayAbbr(draw)}</span>` : '';
      return `<div class="row${staleClass}">
        <span class="time">${draw.time}${correctedTag}</span>
        <span class="balls">${ballsHtml}${staleTag}</span>
      </div>`;
    }).join('');

    return `<div class="card">
      <div class="card-head" style="background:linear-gradient(90deg,${lottery.color},${lighten(lottery.color)})">
        <span class="card-title">${lottery.name}</span>
        ${renderCardStatusBadge(cardStatus)}
      </div>
      ${rows}
    </div>`;
  }

  function lighten(hex) {
    // Simple lighten: blend toward white by ~15%
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    const f = 0.15;
    const lr = Math.min(255, Math.round(r + (255 - r) * f));
    const lg = Math.min(255, Math.round(g + (255 - g) * f));
    const lb = Math.min(255, Math.round(b + (255 - b) * f));
    return `#${lr.toString(16).padStart(2,'0')}${lg.toString(16).padStart(2,'0')}${lb.toString(16).padStart(2,'0')}`;
  }

  function renderBoard(data) {
    const board = document.getElementById('board');
    board.innerHTML = data.columns.map(col =>
      `<div class="col-wrap">${col.lotteries.map(renderCard).join('')}</div>`
    ).join('');
  }

  function renderTicker(data) {
    const items = [];
    for (const col of data.columns) {
      for (const lottery of col.lotteries) {
        for (const draw of lottery.draws) {
          if (draw.status === 'pending') {
            items.push(`<span class="ticker-item">${lottery.name} ${draw.time} &nbsp; <b>PENDING</b></span>`);
          } else if (draw.status === 'no_result' || draw.status === 'closed') {
            continue;
          } else {
            const nums = draw.numbers.join(draw.numbers.includes('-') ? '' : '-');
            items.push(`<span class="ticker-item">${lottery.name} ${draw.time} &nbsp; <b>${nums}</b></span>`);
          }
        }
      }
    }
    const html = items.join('');
    document.getElementById('ticker').innerHTML = html + html;
  }

  // ── Fetch and refresh (only on change) ──

  let lastDataHash = '';

  async function loadResults() {
    try {
      const res = await fetch('/api/results');
      const text = await res.text();

      if (text === lastDataHash) return; // no change
      lastDataHash = text;

      const data = JSON.parse(text);
      renderBoard(data);
      renderTicker(data);
    } catch (e) {
      console.error('Failed to load results:', e);
    }
  }

  loadResults();
  setInterval(loadResults, 30000);
</script>
</body>
</html>
